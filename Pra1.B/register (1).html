<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Registration</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
    .box { background: #fff; padding: 30px 40px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    label { display: block; margin-top: 14px; font-size: 14px; color: #555; font-weight: bold; }
    input { width: 100%; padding: 9px 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px;
            font-size: 14px; box-sizing: border-box; }
    input:focus { outline: none; border-color: #4a90e2; }
    button { width: 100%; margin-top: 22px; padding: 11px; background: #4a90e2; color: #fff;
             border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button:hover { background: #357abd; }
    #msg { margin-top: 14px; text-align: center; font-size: 14px; font-weight: bold; }
    .success { color: green; }
    .error   { color: red; }
    a { display: block; text-align: center; margin-top: 14px; color: #4a90e2; font-size: 14px; }
  </style>
</head>
<body>
<div class="box">
  <h2>Register</h2>

  <label for="name">Full Name</label>
  <input type="text" id="name" placeholder="Enter your name" />

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="Enter your email" />

  <label for="phone">Phone</label>
  <input type="tel" id="phone" placeholder="Enter your phone number" />

  <button onclick="registerUser()">Register</button>
  <div id="msg"></div>
  <a href="list.html">View All Users →</a>
</div>

<script>
  // ─── Step 1: Collect data from form ───────────────────────────────────────
  function registerUser() {
    var name  = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();
    var phone = document.getElementById("phone").value.trim();
    var msg   = document.getElementById("msg");

    // Basic validation
    if (!name || !email || !phone) {
      msg.className = "error";
      msg.textContent = "Please fill all fields.";
      return;
    }

    // ─── Step 2: Build the data object ──────────────────────────────────────
    var userData = {
      id:    Date.now(),       // unique ID using timestamp
      name:  name,
      email: email,
      phone: phone
    };

    // ─── Step 3: Send using AJAX (XMLHttpRequest) ────────────────────────────
    var xhr = new XMLHttpRequest();

    /*
      AJAX POST to a mock/fake API (JSONPlaceholder is a free testing server).
      In a real project, replace this URL with your own server endpoint.
      e.g.,  xhr.open("POST", "http://localhost:3000/register", true);
    */
    xhr.open("POST", "https://jsonplaceholder.typicode.com/users", true);

    // Tell the server we are sending JSON data
    xhr.setRequestHeader("Content-Type", "application/json");

    // ─── Step 4: Handle the server response ─────────────────────────────────
    xhr.onreadystatechange = function () {
      /*
        readyState 4 = request is DONE
        status 201   = Created (server accepted the data)
      */
      if (xhr.readyState === 4 && xhr.status === 201) {

        // ─── Step 5: Push to localStorage array ─────────────────────────────
        var users = JSON.parse(localStorage.getItem("users") || "[]");
        users.push(userData);
        localStorage.setItem("users", JSON.stringify(users));

        msg.className = "success";
        msg.textContent = "✔ Registered successfully!";

        // Clear the form
        document.getElementById("name").value  = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";

      } else if (xhr.readyState === 4) {
        msg.className = "error";
        msg.textContent = "✘ Server error. Please try again.";
      }
    };

    // ─── Step 6: Send the data as JSON string ────────────────────────────────
    xhr.send(JSON.stringify(userData));

    // Show "sending..." while waiting
    msg.className = "";
    msg.textContent = "Sending...";
  }
</script>
</body>
</html>
